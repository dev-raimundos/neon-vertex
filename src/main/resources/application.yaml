spring:
  application:
    name: neon-vertex

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: home
        format_sql: true
        jdbc:
          batch_size: 25
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    default-schema: home
    create-schemas: true
    locations:
      - classpath:db/migration/core
      - classpath:db/migration/modules/users
      - classpath:db/migration/modules/finance
      - classpath:db/migration/modules/auth

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb.core: INFO

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration-ms: 900000
  refresh-token:
    expiration-ms: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html